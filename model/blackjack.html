<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blackjack royale | casino</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        .game-table {
            min-height: 75vh;
            background: radial-gradient(circle at center, #013220 0%, #001f13 100%);
            border: 8px solid #3c2f1f;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 15vw 15vw 20px 20px;
            padding: var(--spacing-xl);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            margin-top: var(--spacing-xl);
        }

        /* lineas doradas del tapete para estilo lujo */
        .game-table::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px dashed rgba(212, 175, 55, 0.4);
            border-radius: 14vw 14vw 10px 10px;
            z-index: 0;
            pointer-events: none;
        }

        .hand-area {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-md);
        }

        .hand-title {
            font-family: var(--font-mono);
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .cards-container {
            display: flex;
            gap: -50px;
            /* solapamiento fuerte */
            min-height: 180px;
        }

        .card {
            width: 120px;
            height: 175px;
            background: #fdfdfd;
            border-radius: 10px;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-family: var(--font-mono);
            /* fuente elegante */
            font-weight: 700;
            color: #0b0505;

            /* estado inicial para anime.js */
            opacity: 0;
            transform: translateY(-80px) rotate(-15deg);
        }

        .card.card-red {
            color: #b00;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            pointer-events: none;
        }

        .card-deck {
            position: absolute;
            right: 50px;
            top: 40%;
            transform: translateY(-50%);
            width: 120px;
            height: 175px;
            background: repeating-linear-gradient(135deg, #111, #111 5px, rgba(212, 175, 55, 0.8) 5px, rgba(212, 175, 55, 0.8) 10px);
            border: 2px solid #fff;
            border-radius: 10px;
            box-shadow: -2px 2px 0 #eee, -4px 4px 0 #ddd, -6px 6px 0 #ccc, 10px 10px 20px rgba(0, 0, 0, 0.8);
            z-index: 0;
        }

        .controls-area {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .bet-input {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-gold);
            color: var(--neon-gold);
            padding: 10px;
            border-radius: 4px;
            width: 120px;
            text-align: center;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.5rem;
            outline: none;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>

<body>
    <div id="bg-canvas"></div>

    <nav class="navbar" id="top-nav">
        <a href="../index.html" class="nav-logo">
            <svg class="logo-svg" viewBox="0 0 100 100" style="width:30px;height:30px;">
                <path d="M50 10 L90 50 L50 90 L10 50 Z" />
            </svg>
            <span style="font-family: var(--font-mono); font-size: 1.5rem; letter-spacing: 2px;">ROYALE</span>
        </a>
        <div class="nav-controls">
            <div class="wallet-box" id="wallet-display">
                <svg class="wallet-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <div class="wallet-balance">
                    <span id="credits-amount">---</span>
                    <span class="currency">CRD</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="game-table">

            <!-- grafico del mazo -->
            <div class="card-deck"></div>

            <!-- mano del crupier -->
            <div class="hand-area">
                <div class="hand-title">crupier <span id="dealer-score"></span></div>
                <div class="cards-container" id="dealer-cards">
                    <!-- insertadas por js -->
                </div>
            </div>

            <!-- mano del jugador -->
            <div class="hand-area">
                <div class="hand-title">jugador <span id="player-score" style="color:#fff;"></span></div>
                <div class="cards-container" id="player-cards">
                    <!-- insertadas por js -->
                </div>
            </div>

            <!-- controles -->
            <div class="controls-area" id="bet-controls">
                <input type="number" id="bet-amount" class="bet-input" value="100" min="10" step="10">
                <button class="btn-luxury" id="deal-btn">
                    <span class="btn-bg"></span>
                    <span>REPARTIR</span>
                </button>
            </div>

            <div class="controls-area" id="game-controls" style="display: none;">
                <button class="btn-luxury" id="hit-btn"
                    style="background: linear-gradient(135deg, #013220, #001f13); color: var(--neon-gold) !important;">
                    PEDIR
                </button>
                <button class="btn-luxury border-red" id="stand-btn"
                    style="background: linear-gradient(135deg, #8B0000, #4a0000); color: #fff !important; border-color: #8B0000;">
                    PLANTARSE
                </button>
            </div>

        </div>
    </main>

    <script src="../logic/wallet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dealBtn = document.getElementById('deal-btn');
            const hitBtn = document.getElementById('hit-btn');
            const standBtn = document.getElementById('stand-btn');
            const betInput = document.getElementById('bet-amount');
            const betControls = document.getElementById('bet-controls');
            const gameControls = document.getElementById('game-controls');

            const playerCardsDiv = document.getElementById('player-cards');
            const dealerCardsDiv = document.getElementById('dealer-cards');

            let currentBet = 0;

            // generador logico de cartas visuales falso
            const getCardHTML = (val, suit) => {
                const isRed = suit === '♥' || suit === '♦';
                return `<div class="card ${isRed ? 'card-red' : ''}">${val}<br><span style="font-size:1.5rem;">${suit}</span></div>`;
            };

            const animateCardDraw = (targetSelector) => {
                // deslizado realista y sin rebotes exagerados (estilo crupier)
                return anime({
                    targets: targetSelector,
                    opacity: [0, 1],
                    translateY: [-50, 0],
                    translateX: [150, 0], // viene del mazo a la derecha
                    rotate: [-15, 0],
                    duration: 500,
                    easing: 'easeOutCubic'
                }).finished;
            };

            dealBtn.addEventListener('click', async () => {
                currentBet = parseInt(betInput.value);
                if (currentBet <= 0) return;

                const success = await window.casinoWallet.wager(currentBet);
                if (!success) return;

                // reiniciar mesa
                playerCardsDiv.innerHTML = '';
                dealerCardsDiv.innerHTML = '';
                document.getElementById('player-score').innerText = '20'; // puntuacion simulada
                document.getElementById('dealer-score').innerText = '10';

                // animar ui de controles
                anime({
                    targets: betControls,
                    opacity: 0,
                    duration: 300,
                    complete: () => {
                        betControls.style.display = 'none';
                        gameControls.style.display = 'flex';
                        anime({ targets: gameControls, opacity: [0, 1], duration: 300 });
                    }
                });

                // "repartir" cartas simulado y pausado realista
                playerCardsDiv.innerHTML += getCardHTML('K', '♠');
                await animateCardDraw('#player-cards .card:last-child');
                await new Promise(r => setTimeout(r, 200));

                dealerCardsDiv.innerHTML += getCardHTML('J', '♦');
                await animateCardDraw('#dealer-cards .card:last-child');
                await new Promise(r => setTimeout(r, 200));

                playerCardsDiv.innerHTML += getCardHTML('Q', '♥');
                await animateCardDraw('#player-cards .card:last-child');
                await new Promise(r => setTimeout(r, 200));

                // carta tapada para el crupier
                dealerCardsDiv.innerHTML += `<div class="card" style="background: repeating-linear-gradient(45deg, #111, #111 5px, #D4AF37 5px, #D4AF37 10px); color:transparent;">?</div>`;
                await animateCardDraw('#dealer-cards .card:last-child');
            });

            hitBtn.addEventListener('click', async () => {
                // agregar carta
                playerCardsDiv.innerHTML += getCardHTML('A', '♣');
                document.getElementById('player-score').innerText = '21';
                await animateCardDraw('#player-cards .card:last-child');
            });

            standBtn.addEventListener('click', async () => {
                // rotar descubriendo la oculta simulada
                const oculta = dealerCardsDiv.lastChild;
                anime({
                    targets: oculta,
                    rotateY: '90deg',
                    duration: 200,
                    easing: 'easeInSine',
                    complete: () => {
                        oculta.outerHTML = getCardHTML('8', '♠');
                        document.getElementById('dealer-score').innerText = '18';
                        const nCard = dealerCardsDiv.lastChild;
                        nCard.style.opacity = 1;
                        nCard.style.transform = 'translateY(0) rotateY(90deg)';

                        anime({
                            targets: nCard,
                            rotateY: 0,
                            duration: 200,
                            easing: 'easeOutSine'
                        });
                    }
                });

                // ganancia del jugador
                setTimeout(async () => {
                    await window.casinoWallet.win(currentBet * 2);
                }, 600);

                setTimeout(() => {
                    // devolver ui
                    betControls.style.display = 'flex';
                    gameControls.style.display = 'none';
                    betControls.style.opacity = 1;
                    playerCardsDiv.innerHTML = '';
                    dealerCardsDiv.innerHTML = '';
                    document.getElementById('player-score').innerText = '';
                    document.getElementById('dealer-score').innerText = '';
                }, 3000);
            });

            // animacion inicial elegante de mesa
            anime({
                targets: '.game-table',
                translateY: [40, 0],
                opacity: [0, 1],
                duration: 1200,
                easing: 'easeOutQuart'
            });
        });
    </script>
</body>

</html>
